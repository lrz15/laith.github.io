<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دي جي شواحة PRO</title>
    <style>
        body {
            background-color: #0b0b14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
        }

        .player-card {
            background: #161625;
            padding: 30px;
            border-radius: 25px;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid #2a2a40;
        }

        .visualizer {
            height: 120px;
            background: linear-gradient(to bottom, #00d2ff, #3a7bd5);
            margin-bottom: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .track-info h2 { margin: 10px 0 5px; font-size: 1.2rem; }
        .track-info p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        button {
            background: none;
            border: none;
            color: #00d2ff;
            font-size: 25px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { transform: scale(1.2); color: #fff; }

        .play-btn {
            font-size: 50px;
            background: #00d2ff;
            color: #161625;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-right: 5px; /* لتوسيط أيقونة المثلث */
        }

        #progress-bar {
            width: 100%;
            margin-top: 20px;
            accent-color: #00d2ff;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="visualizer">MUSIC PLAYER</div>
    
    <div class="track-info">
        <h2 id="title">جاري التحميل...</h2>
        <p id="artist">قائمة التشغيل الخاصة بك</p>
    </div>

    <input type="range" id="progress-bar" value="0" max="100">

    <div class="controls">
        <button onclick="prev()">⏮</button>
        <button class="play-btn" id="play-trigger" onclick="togglePlay()">▶</button>
        <button onclick="next()">⏭</button>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
    const audio = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-trigger');
    const title = document.getElementById('title');
    const progressBar = document.getElementById('progress-bar');

    let currentIndex = 1;
    const totalSongs = 7;

    function loadSong(index) {
        title.innerText = "Song " + index;
        audio.src = "song" + index + ".mp3";
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = "⏸";
        } else {
            audio.pause();
            playBtn.innerText = "▶";
        }
    }

    function next() {
        currentIndex = currentIndex < totalSongs ? currentIndex + 1 : 1;
        loadSong(currentIndex);
        audio.play();
        playBtn.innerText = "⏸";
    }

    function prev() {
        currentIndex = currentIndex > 1 ? currentIndex - 1 : totalSongs;
        loadSong(currentIndex);
        audio.play();
        playBtn.innerText = "⏸";
    }

    // تحديث شريط التقدم
    audio.ontimeupdate = () => {
        const progress = (audio.currentTime / audio.duration) * 100;
        progressBar.value = progress || 0;
    };

    // التحكم بالوقت من خلال الشريط
    progressBar.oninput = () => {
        const seekTime = (progressBar.value / 100) * audio.duration;
        audio.currentTime = seekTime;
    };

    // الانتقال التلقائي للأغنية التالية
    audio.onended = () => next();

    // تشغيل أول أغنية عند التحميل
    loadSong(currentIndex);
</script>

</body>
</html>
