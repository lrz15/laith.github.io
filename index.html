<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شواحة للموسيقى</title>
    <style>
        :root {
            --primary-color: #00d1ff;
            --bg-dark: #0f0f0f;
            --card-bg: #1e1e1e;
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .player-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            width: 85%;
            max-width: 350px;
            text-align: center;
            border: 1px solid #333;
        }

        h1 { font-size: 1.1rem; color: var(--primary-color); margin-bottom: 5px; }
        #now-playing { font-size: 1rem; margin-bottom: 20px; font-weight: bold; }

        /* تنسيق شريط التقدم */
        .progress-container {
            width: 100%;
            background: #333;
            height: 6px;
            border-radius: 10px;
            margin-bottom: 25px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            background: var(--primary-color);
            width: 0%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-top: 5px;
            opacity: 0.7;
        }

        /* الأزرار */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .btn {
            background: #2a2a2a;
            border: none;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover { background: var(--primary-color); color: black; }
        .play-btn { width: 65px; height: 65px; font-size: 1.5rem; background: var(--primary-color); color: black; }

        audio { display: none; }
    </style>
</head>
<body>

    <div class="player-card">
        <h1>🎧 شواحة للخدمات الموسيقية</h1>
        <p id="now-playing">تحميل...</p>
        
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <audio id="main-audio">
            <source id="audio-source" src="" type="audio/mpeg">
        </audio>

        <div class="controls">
            <button class="btn" onclick="prevSong()">⏮</button>
            <button class="btn play-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
            <button class="btn" onclick="nextSong()">⏭</button>
        </div>
    </div>

    <script>
        const playlist = [
            { src: "song1.mp3", title: "يا ريت ترضي يا ريت" },
            { src: "song2.mp3", title: "يا حبيبي قلبي مال" },
            { src: "song4.mp3", title: "الاغنية الرابعة" },
            { src: "song5.mp3", title: "الاغنية الخامسة" },
            { src: "song6.mp3", title: "الاغنية السادسة" },
            { src: "song7.mp3", title: "الاغنية السابعة" },
            { src: "song3.mp3", title: "عايشة وحدا بلاك" }
        ];

        let currentSongIndex = 0;
        const audio = document.getElementById('main-audio');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const titleDisplay = document.getElementById('now-playing');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        function loadSong(index) {
            const song = playlist[index];
            audio.src = song.src;
            titleDisplay.innerText = song.title;
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.innerText = "⏸";
            } else {
                audio.pause();
                playPauseBtn.innerText = "▶";
            }
        }

        // تحديث شريط التقدم والوقت
        audio.ontimeupdate = (e) => {
            const { duration, currentTime } = e.srcElement;
            const progressPercent = (currentTime / duration) * 100;
            progressBar.style.width = `${progressPercent}%`;

            // حساب الوقت المتبقي والمنقضي
            let curM = Math.floor(currentTime / 60);
            let curS = Math.floor(currentTime % 60);
            if (curS < 10) curS = `0${curS}`;
            currentTimeEl.innerText = `${curM}:${curS}`;

            if(duration) {
                let durM = Math.floor(duration / 60);
                let durS = Math.floor(duration % 60);
                if (durS < 10) durS = `0${durS}`;
                durationEl.innerText = `${durM}:${durS}`;
            }
        };

        // الضغط على شريط التقدم للتقديم والتأخير
        progressContainer.onclick = (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        };

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            audio.play();
            playPauseBtn.innerText = "⏸";
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            audio.play();
            playPauseBtn.innerText = "⏸";
        }

        audio.onended = nextSong;

        window.onload = () => loadSong(currentSongIndex);
    </script>
</body>
</html>
