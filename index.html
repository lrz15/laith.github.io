<div class="playlist-card" style="margin-bottom: 10px; padding: 15px; border: 1px dashed var(--primary-color);">
    <p style="margin-top: 0; font-size: 0.9rem; color: var(--primary-color);">➕ إضافة أغنية جديدة (رابط مباشر):</p>
    <div style="display: flex; gap: 10px;">
        <input type="text" id="external-url" placeholder="ضع رابط الملف الصوتي هنا..." 
               style="flex-grow: 1; padding: 8px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff;">
        <button onclick="addExternalSong()" 
                style="background: var(--primary-color); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">إضافة</button>
    </div>
</div>

<script>
    // --- (نفس مصفوفة الأغاني السابقة مع إمكانية الزيادة) ---
    let songsList = [
        { id: 1, title: "يا ريت ترضي يا ريت", artist: "فنان 1", file: "song1.mp3", color: "#e74c3c" },
        { id: 2, title: "يا حبيبي قلبي مال", artist: "فنان 2", file: "song2.mp3", color: "#3498db" },
        { id: 3, title: "عايشة وحدا بلاك", artist: "فنان 3", file: "song3.mp3", color: "#9b59b6" },
        { id: 4, title: "مقطوعة الأمل", artist: "شواحة", file: "song4.mp3", color: "#f1c40f" },
    ];

    // ... (نفس المتغيرات السابقة) ...
    const audio = document.getElementById('main-audio');
    const playlistContainer = document.getElementById('playlist-items');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const vinylDisk = document.getElementById('vinyl-disk');

    let currentSongIndex = -1;

    // --- 1. دالة إضافة أغنية خارجية برابط ---
    function addExternalSong() {
        const urlInput = document.getElementById('external-url');
        const url = urlInput.value.trim();
        
        if (url === "") {
            alert("يرجى وضع رابط صحيح");
            return;
        }

        const newSong = {
            id: songsList.length + 1,
            title: "أغنية خارجية " + (songsList.length + 1),
            artist: "رابط ويب",
            file: url,
            color: "#1db954"
        };

        songsList.push(newSong); // إضافة للمصفوفة
        urlInput.value = ""; // تفريغ الحقل
        buildPlaylist(); // إعادة بناء الواجهة لتظهر الأغنية الجديدة
    }

    // --- 2. دالة بناء القائمة (تم تحديثها لتفريغ القائمة أولاً) ---
    function buildPlaylist() {
        playlistContainer.innerHTML = ""; // تفريغ القديم
        songsList.forEach((song, index) => {
            const songItem = document.createElement('div');
            songItem.className = 'song-item' + (index === currentSongIndex ? ' active' : '');
            songItem.onclick = () => selectAndPlay(index);
            songItem.innerHTML = `
                <div class="song-index">${index + 1}</div>
                <div class="song-info">
                    <span class="song-title">${song.title}</span>
                    <span class="song-artist">${song.artist}</span>
                </div>
                <div class="play-icon"><i class="fas fa-play-circle fa-lg"></i></div>
            `;
            playlistContainer.appendChild(songItem);
        });
    }

    // --- 3. دالة التشغيل التالي (الميزة المطلوبة) ---
    function nextSong() {
        if (currentSongIndex < songsList.length - 1) {
            selectAndPlay(currentSongIndex + 1);
        } else {
            // إذا كانت آخر أغنية، ابدأ من الأول
            selectAndPlay(0);
        }
    }

    // --- 4. مراقبة انتهاء الأغنية (Event Listener) ---
    audio.addEventListener('ended', () => {
        console.log("انتهت الأغنية، جاري تشغيل التالية...");
        nextSong(); // استدعاء دالة التشغيل التالي فوراً
    });

    // ... (باقي الدوال السابقة: selectAndPlay, togglePlay, formatTime) ...
    // تأكد من تحديث دالة selectAndPlay لتشمل buildPlaylist() لتحديث الـ active class
    function selectAndPlay(index) {
        currentSongIndex = index;
        const song = songsList[index];
        audio.src = song.file;
        document.getElementById('current-title').innerText = song.title;
        document.getElementById('current-artist').innerText = song.artist;
        
        buildPlaylist(); // لتحديث العلامة الخضراء (Active)
        startPlayback();
    }

    function startPlayback() {
        audio.play().catch(e => console.log("خطأ في التشغيل: تأكد من صحة الرابط"));
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        vinylDisk.classList.add('playing');
    }

    buildPlaylist();
</script>
