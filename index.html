<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شواحة لخدمات اليوتيوب</title>
    <style>
        :root {
            --primary-color: #ff0000; /* تغيير اللون للأحمر ليتماشى مع يوتيوب */
            --bg-dark: #0f0f0f;
            --card-bg: #1e1e1e;
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .player-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 500px; /* زيادة العرض ليناسب الفيديو */
            text-align: center;
            border: 1px solid #333;
        }

        h1 { font-size: 1.1rem; color: var(--primary-color); margin-bottom: 15px; }
        #video-title { font-size: 1rem; margin-bottom: 15px; font-weight: bold; display: block; }

        /* حاوية الفيديو لجعلها متجاوبة */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* نسبة 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            background: #000;
            margin-bottom: 20px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .btn {
            background: #2a2a2a;
            border: none;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .btn:hover { background: var(--primary-color); color: white; }
    </style>
</head>
<body>

    <div class="player-card">
        <h1>🎧 دي جي شواحاة 🎧 </h1>
        <span id="video-title">تحميل الفيديو...</span>
        
        <div class="video-container">
            <iframe id="youtube-frame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div class="controls">
            <button class="btn" onclick="prevVideo()">⏮</button>
            <span style="font-size: 0.8rem; opacity: 0.6;">تنقل بين الفيديوهات</span>
            <button class="btn" onclick="nextVideo()">⏭</button>
        </div>
    </div>

    <script>
        // قائمة الفيديوهات - ضع معرف الفيديو (Video ID) هنا
        const playlist = [
            { id: "dQw4w9WgXcQ", title: "فيديو التجربة الأول" },
            { id: "jNQXAC9IVRw", title: "فيديو التجربة الثاني" },
            { id: "9bZkp7q19f0", title: "فيديو التجربة الثالث" }
        ];

        let currentIndex = 0;
        const frame = document.getElementById('youtube-frame');
        const titleDisplay = document.getElementById('video-title');

        function loadVideo(index) {
            const video = playlist[index];
            // نستخدم رابط embed وليس الرابط العادي
            frame.src = `https://www.youtube.com/embed/${video.id}?autoplay=0`;
            titleDisplay.innerText = video.title;
        }

        function nextVideo() {
            currentIndex = (currentIndex + 1) % playlist.length;
            loadVideo(currentIndex);
        }

        function prevVideo() {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            loadVideo(currentIndex);
        }

        // تحميل الفيديو الأول عند فتح الصفحة
        window.onload = () => loadVideo(currentIndex);
    </script>
</body>
</html>
